   <script>
     const logoSVG = `<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
       <circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="1.5"/>
       <path d="M20 10 L28 30 L12 30 Z" fill="currentColor" opacity="0.8"/>
       <circle cx="20" cy="22" r="3" fill="white"/>
     </svg>`;

     const defaultConfig = {
       // Colors
       background_color: "#f5f5f5",
       surface_color: "#ffffff",
       text_color: "#1a1410",
       primary_color: "#b8956a",
       secondary_color: "#d4a574",
       // Typography
       font_family: "Noto Serif JP",
       font_size: 16,
       // Content
       site_title: "Scarlett",
       hero_heading: "美しさは内面から理想の肌へ",
       hero_heading_en: "Beauty from Within, Perfect Skin as the Result",
       hero_subheading: "Scarlett 北参道は、\"結果・安心・安全\"を大切にしながら、その日の肌・身体・心に寄り添うケアをご提供します。",
       hero_subheading_en: "Scarlett Kita-Sando provides care that aligns with your skin, body, and heart of the day, prioritizing \"results, peace of mind, and safety.\"",
       concept_title: "医師提携による安心と確実な結果",
       concept_title_en: "Assured Safety and Certain Results Through Medical Partnership",
       concept_text: "Scarlettは、顧問医師提携による安心のもと、安全性と最速の肌改善効果を追求するフェイシャル特化サロンです。",
       concept_text_en: "Scarlett is a facial-specialized salon that pursues safety and rapid skin improvement results under the assurance of medical advisor partnership.",
       strength1_title: "フェイシャル肌質改善に特化",
       strength1_title_en: "Specialized in Facial Skin Quality Improvement",
       strength2_title: "医療提携による安心",
       strength2_title_en: "Peace of Mind Through Medical Partnership",
       strength3_title: "即効性の高いメニュー",
       strength3_title_en: "High-Effectiveness Menu Options",
       lang: "ja" // Current language
     };

     let currentLang = "ja";

     function toggleLanguage() {
       currentLang = currentLang === "ja" ? "en" : "ja";
       updateLanguage();
     }

     function updateLanguage() {
       // Toggle visibility
       document.querySelectorAll(".nav-ja").forEach(el => {
         el.classList.toggle("hidden", currentLang === "en");
       });
       document.querySelectorAll(".nav-en").forEach(el => {
         el.classList.toggle("hidden", currentLang === "ja");
       });

       // Update content
       const heroTitle = document.getElementById("hero-title");
       const heroDesc = document.getElementById("hero-desc");
       const conceptTitle = document.getElementById("concept-title");
       const conceptText = document.getElementById("concept-text");
       const strength1 = document.getElementById("strength1_title");
       const strength2 = document.getElementById("strength2_title");
       const strength3 = document.getElementById("strength3_title");

       if (currentLang === "en") {
         heroTitle.textContent = defaultConfig.hero_heading_en;
         heroDesc.textContent = defaultConfig.hero_subheading_en;
         conceptTitle.textContent = defaultConfig.concept_title_en;
         conceptText.textContent = defaultConfig.concept_text_en;
         strength1.textContent = defaultConfig.strength1_title_en;
         strength2.textContent = defaultConfig.strength2_title_en;
         strength3.textContent = defaultConfig.strength3_title_en;
       } else {
         heroTitle.textContent = defaultConfig.hero_heading;
         heroDesc.textContent = defaultConfig.hero_subheading;
         conceptTitle.textContent = defaultConfig.concept_title;
         conceptText.textContent = defaultConfig.concept_text;
         strength1.textContent = defaultConfig.strength1_title;
         strength2.textContent = defaultConfig.strength2_title;
         strength3.textContent = defaultConfig.strength3_title;
       }
     }

     async function onConfigChange(config) {
       const c = { ...defaultConfig, ...config };
       const baseFontStack = "'Noto Serif JP', serif";
       const fontStack = `'${c.font_family}', ${baseFontStack}`;
       const baseSize = c.font_size;

       // Apply Colors
       const app = document.getElementById('app');
       app.style.backgroundColor = c.background_color;
       app.style.color = c.text_color;

       const navbar = document.getElementById('navbar');
       navbar.style.backgroundColor = `${c.background_color}F0`;
       navbar.style.backdropFilter = "blur(12px)";

       const primaryBtns = [document.getElementById('nav-cta'), document.getElementById('main-cta')];
       primaryBtns.forEach(btn => {
         btn.style.backgroundColor = c.primary_color;
         btn.style.color = "#ffffff";
       });

       const secBtn = document.getElementById('sec-cta');
       secBtn.style.borderColor = c.primary_color;
       secBtn.style.color = c.primary_color;

       const heroBg = document.querySelector('#hero .absolute');
       if (heroBg) {
         heroBg.style.background = `radial-gradient(ellipse at center, ${c.secondary_color}30, transparent 70%)`;
       }

       // Apply Typography
       app.style.fontFamily = fontStack;

       const elegantTitles = document.querySelectorAll('.elegant-title');
       elegantTitles.forEach(el => {
         el.style.fontSize = el.id === 'nav-logo' || el.id === 'footer-logo' ? `${baseSize * 1.5}px` : 
                            el.id === 'hero-title' ? `${baseSize * 3.5}px` :
                            el.id === 'concept-title' ? `${baseSize * 2.5}px` : `${baseSize * 2}px`;
         el.style.color = c.text_color;
       });

       document.getElementById('hero-title').style.fontSize = `${baseSize * 3.5}px`;
       document.getElementById('hero-title').style.color = c.text_color;
       
       document.getElementById('hero-desc').style.fontSize = `${baseSize * 1.125}px`;
       document.getElementById('hero-desc').style.color = c.text_color;

       document.getElementById('concept-text').style.fontSize = `${baseSize * 1.125}px`;
       document.getElementById('concept-text').style.color = c.text_color;

       // Apply Content
       document.getElementById('nav-logo').textContent = c.site_title;
       document.getElementById('footer-logo').textContent = c.site_title;
       
       // Update based on current language
       updateLanguage();

       lucide.createIcons();
     }

     function mapToCapabilities(config) {
       return {
         recolorables: [
           { 
             get: () => config.background_color || defaultConfig.background_color, 
             set: (v) => window.elementSdk.setConfig({ background_color: v }) 
           },
           { 
             get: () => config.surface_color || defaultConfig.surface_color, 
             set: (v) => window.elementSdk.setConfig({ surface_color: v }) 
           },
           { 
             get: () => config.text_color || defaultConfig.text_color, 
             set: (v) => window.elementSdk.setConfig({ text_color: v }) 
           },
           { 
             get: () => config.primary_color || defaultConfig.primary_color, 
             set: (v) => window.elementSdk.setConfig({ primary_color: v }) 
           },
           { 
             get: () => config.secondary_color || defaultConfig.secondary_color, 
             set: (v) => window.elementSdk.setConfig({ secondary_color: v }) 
           }
         ],
         borderables: [],
         fontEditable: {
           get: () => config.font_family || defaultConfig.font_family,
           set: (v) => window.elementSdk.setConfig({ font_family: v })
         },
         fontSizeable: {
           get: () => config.font_size || defaultConfig.font_size,
           set: (v) => window.elementSdk.setConfig({ font_size: v })
         }
       };
     }

     function mapToEditPanelValues(config) {
       const c = { ...defaultConfig, ...config };
       return new Map([
         ["site_title", c.site_title],
         ["hero_heading", c.hero_heading],
         ["hero_heading_en", c.hero_heading_en],
         ["hero_subheading", c.hero_subheading],
         ["hero_subheading_en", c.hero_subheading_en],
         ["concept_title", c.concept_title],
         ["concept_title_en", c.concept_title_en],
         ["concept_text", c.concept_text],
         ["concept_text_en", c.concept_text_en],
         ["strength1_title", c.strength1_title],
         ["strength1_title_en", c.strength1_title_en],
         ["strength2_title", c.strength2_title],
         ["strength2_title_en", c.strength2_title_en],
         ["strength3_title", c.strength3_title],
         ["strength3_title_en", c.strength3_title_en]
       ]);
     }

     // Initialize SDK
     if (window.elementSdk) {
       window.elementSdk.init({
         defaultConfig,
         onConfigChange,
         mapToCapabilities,
         mapToEditPanelValues
       });
     } else {
       // Fallback for direct viewing
       onConfigChange(defaultConfig);
     }

     // Language toggle button
     document.addEventListener('DOMContentLoaded', () => {
       // Initialize the nav title
       document.getElementById('nav-logo').textContent = defaultConfig.site_title;
       document.getElementById('footer-logo').textContent = defaultConfig.site_title;

       const langToggle = document.getElementById('lang-toggle');
       if (langToggle) {
         langToggle.addEventListener('click', toggleLanguage);
       }

       const mobileLangToggle = document.getElementById('mobile-lang-toggle');
       if (mobileLangToggle) {
         mobileLangToggle.addEventListener('click', () => {
           toggleLanguage();
           closeMobileMenu();
         });
       }

       // Mobile menu toggle
       const mobileMenuBtn = document.getElementById('mobile-menu-btn');
       const mobileMenu = document.getElementById('mobile-menu');
       
       if (mobileMenuBtn && mobileMenu) {
         mobileMenuBtn.addEventListener('click', (e) => {
           e.stopPropagation();
           mobileMenu.classList.toggle('hidden');
         });

         // Close menu when a link is clicked
         mobileMenu.querySelectorAll('a').forEach(link => {
           link.addEventListener('click', () => {
             mobileMenu.classList.add('hidden');
           });
         });

         // Close menu when clicking outside
         document.addEventListener('click', (e) => {
           if (!mobileMenu.contains(e.target) && e.target !== mobileMenuBtn) {
             mobileMenu.classList.add('hidden');
           }
         });
       }

       function closeMobileMenu() {
         if (mobileMenu) {
           mobileMenu.classList.add('hidden');
         }
       }

       const navCta = document.getElementById('nav-cta');
       const mainCta = document.getElementById('main-cta');
       
       navCta.textContent = currentLang === 'ja' ? 'ご予約' : 'Book Now';
       mainCta.textContent = currentLang === 'ja' ? 'ご予約はこちら' : 'Book Now';
       
       function scrollToCTA() {
         const ctaSection = document.getElementById('cta-section');
         if (ctaSection) {
           ctaSection.scrollIntoView({ behavior: 'smooth' });
         }
       }
       
       if (navCta) {
         navCta.addEventListener('click', scrollToCTA);
         navCta.style.cursor = "pointer";
       }
       if (mainCta) {
         mainCta.addEventListener('click', scrollToCTA);
         mainCta.style.cursor = "pointer";
       }

       lucide.createIcons();
     });
   </script>
